    <script>
const now = new Date();

const formattedDate = now.toLocaleDateString("en-US", {
    month: "long",
    day: "numeric",
    year: "numeric"
});

const formattedTime = now.toLocaleTimeString("en-US", {
    hour: "numeric",
    minute: "2-digit"
});

const timezone = Intl.DateTimeFormat("en-US", {
    timeZoneName: "short"
})
.formatToParts(now)
.find(part => part.type === "timeZoneName")
.value;

document.getElementById("access-date").textContent =
    `Accessed ${formattedDate} — ${formattedTime} ${timezone}`;
</script>
